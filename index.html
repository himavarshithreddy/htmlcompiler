<script>
document.onkeyup = function(e) {
  if (e.altKey && e.which === 82) { // Alt + R
    run();
  } else if (e.altKey && e.which === 67) { // Alt + C
    document.getElementById("htmlcode").value = "<!DOCTYPE html>\n\n<html>\n\n<head>\n\n\n\n</head>\n\n</html>";
    run();
  }
};

// Tab key: insert two spaces instead of moving focus
document.querySelectorAll('textarea').forEach(function(ta) {
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var start = this.selectionStart;
      var end = this.selectionEnd;
      this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 2;
    }
  });
});
</script>
