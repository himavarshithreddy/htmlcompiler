<!DOCTYPE html>
<html>
<head>
<title>HTML Compiler</title>
<style>
body {
  background: #0f0f1a;
  color: #e8e8f0;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  margin: 0;
}
h1 { color: #04AA6D; margin-bottom: 8px; }
p  { color: #8888aa; font-size: 14px; margin-bottom: 24px; }
ul { list-style: none; padding: 0; max-width: 520px; width: 100%; }
li {
  background: #1a1a2e;
  border: 1px solid #2a2a40;
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 8px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
li::before { content: "▸"; color: #04AA6D; }
</style>
</head>
<body>
<h1>Welcome to HTML Compiler</h1>
<p>A professional online IDE for HTML, CSS &amp; JavaScript</p>
<ul>
  <li>Edit code on the left and click <strong>Run</strong> (or Alt+R) to preview</li>
  <li>Toggle <strong>Live Preview</strong> for instant updates as you type</li>
  <li>Use <strong>Split Editor</strong> to work with HTML, CSS, and JS separately</li>
  <li>Toggle <strong>Orientation</strong> to switch between side-by-side and stacked layout</li>
  <li>Switch <strong>Light Mode</strong> for a bright theme</li>
  <li>Click <strong>Save</strong> (Alt+S) to download your code as an HTML file</li>
</ul>
</body>
</html></textarea>

<script>
document.onkeyup = function(e) {
  if (e.altKey && e.which === 82) { // Alt+R — Run
    run();
  } else if (e.altKey && e.which === 67) { // Alt+C — Clear
    document.getElementById("htmlcode").value = "<!DOCTYPE html>\n\n<html>\n\n<head>\n\n\n\n</head>\n\n</html>";
    run();
    updateStatusBar(document.getElementById("htmlcode"));
  } else if (e.altKey && e.which === 83) { // Alt+S — Save
    download();
  }
};

// Tab key: insert two spaces instead of moving focus
document.querySelectorAll('textarea').forEach(function(ta) {
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var start = this.selectionStart;
      var end   = this.selectionEnd;
      this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 2;
      updateStatusBar(this);
    }
  });
});
</script>
